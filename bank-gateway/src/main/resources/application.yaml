server:
  port: 8086 # Cổng của API Gateway

spring:
  application:
    name: bank-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://127.0.0.1:5500"
              - "http://localhost:5500" # Thêm dòng này để Frontend gọi bằng localhost cũng được qua
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:

        - id: service-1
          uri: http://account-service:8080 # Đổi localhost thành account-service
          predicates:
            - Path=/accountService/**

        - id: service-2
          uri: http://user-service:8081 # Đổi localhost thành user-service
          predicates:
            - Path=/userService-Linh/**

        - id: service-3
          uri: http://trans-service:8082 # Đổi localhost thành trans-service
          predicates:
            - Path=/transService-Sang/**

        - id: service-4
          uri: http://saving-service:8083 # Đổi localhost thành saving-service
          predicates:
            - Path=/savingService-Tien/**

        - id: service-5
          uri: http://noti-service:8084 # Đổi localhost thành noti-service
          predicates:
            - Path=/noti-Nguyet/**